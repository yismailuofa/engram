<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>engram</title>
    <meta name="theme-color" content="#2d6eb0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="engram" />
    <meta
      name="description"
      content="engram is an offline video viewer for your browser."
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>engram</h1>
      <p class="note">
        Videos and playback position are stored offline in your browser.
        Clearing site data removes them.
      </p>
      <div class="header__row">
        <label class="upload">
          <span class="upload__label">Add videos</span>
          <input type="file" id="file-input" accept="video/*" multiple />
        </label>
        <p
          id="save-status"
          class="save-status"
          data-state="ready"
          role="status"
          aria-live="polite"
        >
          Ready
        </p>
      </div>
    </header>

    <main>
      <p id="empty-state" class="empty-state" hidden>
        No videos yet. Add files above.
      </p>
      <ul id="video-list" class="video-list"></ul>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
